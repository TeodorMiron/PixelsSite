<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Pixel's World</title>
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .contact-hero {
      background: linear-gradient(135deg, var(--pink-light), var(--blue-light));
      padding: 4rem 0;
      text-align: center;
    }
    .contact-hero h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 0.75rem; }
    .contact-hero p  { color: var(--muted); font-size: 1.05rem; }

    .contact-body { padding: 4rem 0; }

    .contact-form {
      background: var(--white);
      border-radius: 20px;
      padding: 2.5rem;
      max-width: 560px;
      margin-inline: auto;
      box-shadow: 0 4px 32px #0001;
    }

    .form-group { margin-bottom: 1.25rem; }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--off-white);
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--pink);
    }

    .form-group textarea { min-height: 120px; resize: vertical; }

    .form-submit {
      width: 100%;
      padding: 0.9rem;
      background: var(--pink-dark);
      color: var(--white);
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .form-submit:hover { background: var(--pink); transform: translateY(-2px); }
  </style>
</head>
<body>

  <header class="nav">
    <div class="container nav__inner">
      <a href="../index.html" class="nav__logo">📷 Pixel's <span>World</span></a>
      <nav>
        <ul class="nav__links" id="navLinks">
          <li><a href="../index.html#produse">Produse</a></li>
          <li><a href="../index.html#de-ce-noi">De ce noi</a></li>
          <li><a href="../index.html#recenzii">Recenzii</a></li>
          <li><a href="contact.html" class="nav__cta">Comandă acum</a></li>
        </ul>
      </nav>
      <button class="nav__hamburger" id="navToggle" aria-label="Deschide meniu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <section class="contact-hero">
    <div class="container">
      <h1>Comandă sau contactează-ne</h1>
      <p>Completează formularul și te contactăm în cel mai scurt timp.</p>
    </div>
  </section>

  <section class="contact-body">
    <div class="container">
      <form class="contact-form" id="contactForm">
        <div class="form-group">
          <label for="name">Nume complet</label>
          <input type="text" id="name" name="name" placeholder="Ex: Maria Ionescu" required />
        </div>
        <div class="form-group">
          <label for="email">Adresă de email</label>
          <input type="email" id="email" name="email" placeholder="exemplu@email.com" required />
        </div>
        <div class="form-group">
          <label for="phone">Telefon</label>
          <input type="tel" id="phone" name="phone" placeholder="07xx xxx xxx" />
        </div>
        <div class="form-group">
          <label for="product">Produsul dorit</label>
          <select id="product" name="product">
            <option value="">Selectează un album</option>
            <option value="pxl-2">Povestea Mea — Roz (PXL-2) · 90 Lei</option>
            <option value="pxl-1">Povestea Mea — Albastru (PXL-1) · 90 Lei</option>
            <option value="ambele">Ambele variante</option>
          </select>
        </div>
        <div class="form-group">
          <label for="message">Mesaj (opțional)</label>
          <textarea id="message" name="message" placeholder="Orice detaliu suplimentar..."></textarea>
        </div>
        <button type="submit" class="form-submit">Trimite comanda →</button>
      </form>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>© 2026 Pixel's World · <a href="about.html">Despre noi</a> · <a href="contact.html">Contact</a></p>
    </div>
  </footer>

  <script src="../js/main.js"></script>
  <script>
    document.getElementById('contactForm').addEventListener('submit', e => {
      e.preventDefault();
      alert('Mulțumim! Te contactăm în curând. 💕');
      e.target.reset();
    });
  </script>
</body>
</html>
